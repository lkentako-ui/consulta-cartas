<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mont - Consulta de Cartas</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: #0b0e12; color: #e8eaed; padding: 0; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 0 12px 40px; }

  /* Cabeçalho / marca */
  .topbar { background: linear-gradient(135deg, #16202e 0%, #0f1620 55%, #1a1224 100%); border-bottom: 1px solid #232b36; padding: 22px 0 20px; margin-bottom: 4px; }
  .topbar .inner { max-width: 1100px; margin: 0 auto; padding: 0 16px; display: flex; align-items: center; gap: 14px; }
  .logo { width: 46px; height: 46px; min-width: 46px; border-radius: 12px; object-fit: cover; display: block; }
  .brand h1 { font-size: 21px; font-weight: 700; color: #fff; letter-spacing: -.3px; }
  .brand .tag { font-size: 12px; color: #8a93a0; margin-top: 1px; }

  /* Estatísticas */
  .stats { display: flex; gap: 8px; flex-wrap: wrap; margin: 14px 0 4px; }
  .stat { flex: 1; min-width: 110px; background: #141a22; border: 1px solid #232b36; border-radius: 12px; padding: 12px 14px; }
  .stat .num { font-size: 20px; font-weight: 700; color: #fff; }
  .stat .lbl { font-size: 11px; color: #8a93a0; margin-top: 2px; }
  .stat.s-LOR .num { color: #b794f6; } .stat.s-MTG .num { color: #f6ad55; }
  .stat.s-OP .num { color: #fc8181; } .stat.s-PROD .num { color: #6ee7b7; }

  .searchbar { position: sticky; top: 0; background: #0b0e12; padding: 12px 0; z-index: 10; }
  .searchwrap { position: relative; }
  .searchwrap .ico { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #5a6472; font-size: 18px; pointer-events: none; }
  #q { width: 100%; padding: 15px 16px 15px 44px; font-size: 17px; border: 2px solid #2a3441; border-radius: 14px; background: #161c25; color: #fff; outline: none; transition: border-color .15s; }
  #q:focus { border-color: #4a9eff; box-shadow: 0 0 0 3px rgba(74,158,255,.15); }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  select { padding: 9px 12px; font-size: 14px; border: 1px solid #2a3441; border-radius: 8px; background: #161c25; color: #e8eaed; }
  .count { font-size: 13px; color: #8a93a0; margin: 4px 0 10px; }

  /* Tela inicial (antes de buscar) */
  .welcome { text-align: center; padding: 30px 16px 20px; }
  .welcome h2 { font-size: 17px; color: #cbd5e0; font-weight: 600; margin-bottom: 6px; }
  .welcome p { font-size: 13px; color: #8a93a0; max-width: 460px; margin: 0 auto 22px; line-height: 1.5; }
  .chips { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .chip { padding: 12px 18px; border-radius: 12px; border: 1px solid #2a3441; background: #141a22; color: #e8eaed; font-size: 14px; font-weight: 600; cursor: pointer; transition: transform .1s, border-color .15s; display: flex; align-items: center; gap: 8px; }
  .chip:hover { transform: translateY(-2px); }
  .chip .dot { width: 9px; height: 9px; border-radius: 50%; }
  .chip.c-LOR { border-color: #7c3aed55; } .chip.c-LOR .dot { background: #b794f6; }
  .chip.c-MTG { border-color: #d9770655; } .chip.c-MTG .dot { background: #f6ad55; }
  .chip.c-OP  { border-color: #dc262655; } .chip.c-OP .dot  { background: #fc8181; }
  .chip.c-PROD{ border-color: #05966955; } .chip.c-PROD .dot{ background: #6ee7b7; }
  .card { background: #171c24; border: 1px solid #232b36; border-radius: 12px; padding: 14px; margin-bottom: 10px; display: flex; gap: 14px; }
  .thumb { width: 90px; min-width: 90px; height: 126px; border-radius: 8px; background: #0f1319 center/cover no-repeat; border: 1px solid #232b36; cursor: pointer; position: relative; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display:none; }
  .thumb .ph { font-size: 10px; color: #4a5568; text-align:center; padding: 4px; }
  .cbody { flex: 1; min-width: 0; }
  .cardtop { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .cname { font-size: 16px; font-weight: 700; color: #fff; }
  .cedi { font-size: 12px; color: #8a93a0; margin-top: 2px; }
  .tag { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 6px; white-space: nowrap; }
  .t-LOR { background: #7c3aed33; color: #b794f6; }
  .t-MTG { background: #d9770633; color: #f6ad55; }
  .t-OP  { background: #dc262633; color: #fc8181; }
  .t-PROD{ background: #05966933; color: #6ee7b7; }
  .rows { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
  .row { display: grid; grid-template-columns: auto 1fr auto; gap: 8px; align-items: center; background: #0f1319; border-radius: 8px; padding: 8px 10px; font-size: 13px; }
  .badges { display: flex; gap: 6px; flex-wrap: wrap; }
  .b { font-size: 11px; padding: 2px 7px; border-radius: 5px; background: #232b36; color: #cbd5e0; }
  .b.ql { background: #1e3a5f; color: #90cdf4; }
  .b.idi { background: #3a2e1e; color: #f0c88a; }
  .b.x { background: #4a1e3a; color: #f6a8d4; }
  .qtd { font-size: 15px; font-weight: 700; color: #6ee7b7; white-space: nowrap; }
  .qtd small { font-size: 11px; color: #8a93a0; font-weight: 400; }

  .empty { text-align: center; padding: 40px; color: #8a93a0; }
  .modal { position: fixed; inset: 0; background: rgba(0,0,0,.85); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .modal.on { display: flex; }
  .modal img { max-width: 90vw; max-height: 90vh; border-radius: 12px; }
  @media (max-width: 600px) { .row { grid-template-columns: 1fr; gap: 4px; } .thumb { width: 70px; min-width:70px; height: 98px; } }
</style>
</head>

const norm = s => (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');

// ---- montagem de URLs de imagem por tipo ----
function imgUrls(d){
  const urls = [];
  if(d.t==='MTG' && d.sig && d.num){
    const num = d.num.toString().trim();
    urls.push('https://api.scryfall.com/cards/'+encodeURIComponent(d.sig.toLowerCase())+'/'+encodeURIComponent(num)+'?format=image&version=normal');
    const numBase = num.replace(/[a-z]+$/i,'');
    if(numBase && numBase!==num) urls.push('https://api.scryfall.com/cards/'+encodeURIComponent(d.sig.toLowerCase())+'/'+encodeURIComponent(numBase)+'?format=image&version=normal');
  } else if(d.t==='LOR'){
    const set = (d.sig||'').replace(/[^0-9]/g,'');   // LOR12 -> 12
    const num = (d.num||'').toString().replace(/[^0-9]/g,'');
    if(set && num){
      const p = num.padStart(3,'0');
      urls.push('https://cdn.dreamborn.ink/images/en/cards/'+set+'-'+p);
      urls.push('https://lorcana-api.com/images/'+set+'/'+num+'.webp');
    }
  } else if(d.t==='OP'){
    let code = (d.num||'').toString().toUpperCase();
    const m = code.match(/([A-Z]{2,3}\d{1,2})-(\d{2,3})(-[A-Z]+)?/); // OP13-007 / OP13-007-AA / OP07-118-SP
    if(m){
      const setc = m[1], cardn = m[2], suf = m[3] || '';
      const base = setc+'-'+cardn;
      if(suf === '-AA' || suf === '-SP'){
        // Arte alternativa: tenta Limitless com sufixo, depois oficial com _p1
        urls.push('https://limitlesstcg.nyc3.cdn.digitaloceanspaces.com/one-piece/'+setc+'/'+base+suf+'_EN.webp');
        urls.push('https://en.onepiece-cardgame.com/images/cardlist/card/'+base+'_p1.png');
      }
      // Fallback para arte normal
      urls.push('https://en.onepiece-cardgame.com/images/cardlist/card/'+base+'.png');
      urls.push('https://limitlesstcg.nyc3.cdn.digitaloceanspaces.com/one-piece/'+setc+'/'+base+'_EN.webp');
    }
  }
  return urls;
}

function ligaUrl(d){
  if(d.t==='PROD'){
    const nome = limpo(d.num) || limpo(d.ne) || '';
    return 'https://www.ligamagic.com.br/?view=cards/search&card='+encodeURIComponent(nome);
  }
  const nome = (d.ne || d.n || '').replace(/\s*\(#[^)]*\)\s*/g,'').trim();
  const q = encodeURIComponent(nome);
  if(d.t==='LOR') return 'https://www.ligalorcana.com.br/?view=cards/search&card='+q;
  if(d.t==='OP')  return 'https://www.ligaonepiece.com.br/?view=cards/search&card='+q;
  return 'https://www.ligamagic.com.br/?view=cards/search&card='+q;
}

const q = document.getElementById('q');
const fTipo=document.getElementById('fTipo'), fEdi=document.getElementById('fEdi'), fQl=document.getElementById('fQl'), fIdi=document.getElementById('fIdi');
const results=document.getElementById('results'), countEl=document.getElementById('count');
const modal=document.getElementById('modal'), modalImg=document.getElementById('modalImg');

const TIPO_NOME = { LOR:'Lorcana', MTG:'Magic', OP:'One Piece', PROD:'Produtos' };

function limpo(v){ v=(v==null?'':(''+v)).trim(); return (v==='' || v.toLowerCase()==='nan') ? '' : v; }
function nomeCarta(d){ if(d.t==='PROD') return limpo(d.num) || limpo(d.ne) || '(sem nome)'; return limpo(d.n) || limpo(d.ne) || limpo(d.num) || '(sem nome)'; }

function fill(sel, vals){ [...new Set(vals.filter(Boolean))].sort().forEach(v=>{ const o=document.createElement('option'); o.value=v; o.textContent=v; sel.appendChild(o); }); }
fill(fTipo, DATA.map(d=>d.t));
fill(fEdi, DATA.map(d=>d.ed));
fill(fQl, DATA.map(d=>d.ql));
fill(fIdi, DATA.map(d=>d.idi));

modal.addEventListener('click',()=>modal.classList.remove('on'));

// carrega imagem tentando urls em sequencia (fallback)
function loadThumb(el){
  const urls = JSON.parse(el.dataset.urls);
  const img = el.querySelector('img');
  const ph = el.querySelector('.ph');
  let i=0;
  function tryNext(){
    if(i>=urls.length){ return; } // deixa placeholder
    img.onerror = ()=>{ i++; tryNext(); };
    img.onload = ()=>{ img.style.display='block'; ph.style.display='none'; };
    img.src = urls[i];
  }
  if(urls.length) tryNext();
}

function render(){
  const term = norm(q.value.trim());
  const t=fTipo.value, ed=fEdi.value, ql=fQl.value, idi=fIdi.value;
  let list = DATA.filter(d=>{
    if(t && d.t!==t) return false;
    if(ed && d.ed!==ed) return false;
    if(ql && d.ql!==ql) return false;
    if(idi && d.idi!==idi) return false;
    if(term){
      const hay = norm(d.n)+' '+norm(d.ne)+' '+norm(d.num)+' '+norm(d.sig);
      return term.split(/\s+/).every(w=>hay.includes(w));
    }
    return true;
  });
  if(!term && !t && !ed && !ql && !idi){
    countEl.textContent='';
    results.innerHTML = `<div class="welcome">
      <h2>Comece a buscar</h2>
      <p>Digite o nome da carta (em portugu&ecirc;s ou ingl&ecirc;s), o n&uacute;mero ou a edi&ccedil;&atilde;o. Ou toque em um atalho abaixo para ver tudo de um tipo.</p>
      <div class="chips">
        <div class="chip c-MTG" data-tipo="MTG"><span class="dot"></span>Magic</div>
        <div class="chip c-LOR" data-tipo="LOR"><span class="dot"></span>Lorcana</div>
        <div class="chip c-OP" data-tipo="OP"><span class="dot"></span>One Piece</div>
        <div class="chip c-PROD" data-tipo="PROD"><span class="dot"></span>Produtos</div>
      </div>
    </div>`;
    results.querySelectorAll('.chip').forEach(c=>{
      c.addEventListener('click', ()=>{ fTipo.value = c.dataset.tipo; render(); window.scrollTo({top:0, behavior:'smooth'}); });
    });
    return;
  }

  const groups={};
  list.forEach(d=>{ const key=d.n+'|'+d.ed+'|'+d.num; (groups[key]=groups[key]||{head:d,rows:[]}).rows.push(d); });
  const keys=Object.keys(groups).sort((a,b)=> norm(groups[a].head.n).localeCompare(norm(groups[b].head.n)));
  countEl.textContent = keys.length+' carta(s) &middot; '+list.length+' varia&ccedil;&atilde;o(&otilde;es)';
  if(!keys.length){ results.innerHTML='<div class="empty">Nada encontrado.</div>'; return; }

  results.innerHTML = keys.map((k,gi)=>{
    const g=groups[k], h=g.head;
    const total = g.rows.reduce((s,r)=>s+r.q,0);
    const urls = imgUrls(h);
    const rows = g.rows.map(r=>`
      <div class="row">
        <div class="qtd">${r.q}<small> un</small></div>
        <div class="badges">
          ${r.ql?`<span class="b ql">${r.ql}</span>`:''}
          ${r.idi?`<span class="b idi">${r.idi}</span>`:''}
          ${r.x?`<span class="b x">${r.x}</span>`:''}
        </div>
      </div>`).join('');
    return `<div class="card">
      <div class="thumb" data-urls='${JSON.stringify(urls).replace(/'/g,"&#39;")}' data-liga="${ligaUrl(h)}" data-gi="${gi}" title="Clique para abrir na Liga">
        <img alt="">
        <div class="ph">ver na<br>Liga</div>
      </div>
      <div class="cbody">
        <div class="cardtop">
          <div>
            <div class="cname">${nomeCarta(h)}</div>
            <div class="cedi">${h.t==='PROD' ? limpo(h.ed) :(limpo(h.ed)+(limpo(h.sig)?' &middot; '+limpo(h.sig):'')+(limpo(h.num)?' &middot; #'+limpo(h.num):'')+(limpo(h.ne)&&limpo(h.ne)!==nomeCarta(h)?' &middot; '+limpo(h.ne):''))}</div>
          </div>
          <div style="text-align:right">
            <span class="tag t-${h.t}">${h.t}</span>
            <div class="qtd" style="margin-top:6px">${total}<small> total</small></div>
          </div>
        </div>
        <div class="rows">${rows}</div>
      </div>
    </div>`;
  }).join('');

  document.querySelectorAll('.thumb').forEach(el=>{
    loadThumb(el);
    el.addEventListener('click',()=>{
      window.open(el.dataset.liga, '_blank', 'noopener');
    });
  });
}
q.addEventListener('input', render);
[fTipo,fEdi,fQl,fIdi].forEach(s=>s.addEventListener('change', render));
render();
</script>
</body>
</html>
